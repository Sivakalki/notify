spring:
  application:
    name: notify-backend

  config:
    import: "optional:file:.env[.properties]"

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:notify}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notify-consumer-group
      auto-offset-reset: earliest

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: ${SERVER_PORT:8080}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

notify:
  kafka:
    topics:
      email-notification: email-notification
      sms-notification: sms-notification
      in-app-notification: in-app-notification
      notification-status: notification-status
      retry-notification: retry-notification
    partitions:
      main: 6
      retry: 3
    replication-factor: 1
    consumer:
      concurrency: 1
  retry:
    max-attempts: 3
  deduplication:
    idempotency-ttl-hours: 24
  security:
    rate-limit-per-minute: 1000
    auth-cache-ttl-hours: 1

logging:
  level:
    org.flywaydb: DEBUG
    com.notify.backend.kafka.producer.NotificationProducer: DEBUG